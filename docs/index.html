<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margo Roadmap Dashboard</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Design tokens                                                        */
    /* ------------------------------------------------------------------ */
    :root {
      --brand:        #00358C;
      --brand-dark:   #002570;
      --text:         #111827;
      --text-muted:   #6b7280;
      --bg:           #f0f4f9;
      --surface:      #ffffff;
      --border:       #d1dce8;
      --radius:       10px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      background: var(--brand);
      color: #fff;
      padding: 18px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 10px rgba(0,0,60,0.28);
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.77rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ------------------------------------------------------------------ */
    /* Main layout                                                          */
    /* ------------------------------------------------------------------ */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* ------------------------------------------------------------------ */
    /* Summary bar                                                          */
    /* ------------------------------------------------------------------ */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 22px;
      box-shadow: var(--shadow-sm);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .summary-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
    }

    .summary-count {
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .progress-track {
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2e7d32, #1B5E20);
      border-radius: 5px;
      width: 0%;
      transition: width 0.9s cubic-bezier(.4,0,.2,1);
    }

    .summary-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 7px;
    }

    .pct-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: #1B5E20;
    }

    /* ------------------------------------------------------------------ */
    /* Panels grid — auto-fits any number of panels                        */
    /* ------------------------------------------------------------------ */
    .themes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 600px) {
      .themes  { grid-template-columns: 1fr; }
      header   { position: static; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .panel-header {
      background: var(--brand);
      color: #fff;
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.2px;
    }

    .panel-count {
      font-size: 0.72rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 2px 9px;
    }

    .tile-list {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .empty-panel {
      padding: 18px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-style: italic;
    }

    /* ------------------------------------------------------------------ */
    /* Tiles                                                                */
    /* ------------------------------------------------------------------ */
    .tile {
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.09);
      cursor: pointer;
      user-select: none;
      transition: box-shadow 0.15s;
    }

    .tile:hover  { box-shadow: 0 3px 10px rgba(0,0,0,0.14); }
    .tile:active { opacity: 0.92; }

    .tile-head {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 11px;
    }

    .tile-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.18);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .tile-name {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .tile-arrow {
      font-size: 0.6rem;
      opacity: 0.5;
      flex-shrink: 0;
      margin-top: 4px;
      transition: transform 0.18s;
    }

    .tile.open .tile-arrow { transform: rotate(90deg); }

    /* Detail body */
    .tile-body {
      display: none;
      padding: 9px 11px 11px;
      border-top: 1px solid rgba(0,0,0,0.1);
      font-size: 0.78rem;
    }

    .tile.open .tile-body { display: block; }

    .detail-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .detail-row:last-of-type { margin-bottom: 0; }

    .detail-label {
      font-weight: 600;
      color: rgba(0,0,0,0.42);
      min-width: 88px;
      flex-shrink: 0;
    }

    .detail-value { color: rgba(0,0,0,0.78); }

    .gh-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.77rem;
      color: var(--brand);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,53,140,0.35);
      word-break: break-all;
    }

    .gh-link:hover { border-bottom-color: var(--brand); }

    /* ------------------------------------------------------------------ */
    /* Tile colour — set via inline style by JS; only white-text override  */
    /* needs a CSS class (.tile-dark)                                       */
    /* ------------------------------------------------------------------ */
    .tile-dark .tile-body        { border-top-color: rgba(255,255,255,0.18); }
    .tile-dark .tile-dot         { background: rgba(255,255,255,0.35); }
    .tile-dark .tile-arrow       { opacity: 0.7; }
    .tile-dark .detail-label     { color: rgba(255,255,255,0.52); }
    .tile-dark .detail-value     { color: rgba(255,255,255,0.88); }
    .tile-dark .gh-link          { color: #a5d6a7; border-bottom-color: rgba(165,214,167,0.4); }
    .tile-dark .gh-link:hover    { border-bottom-color: #a5d6a7; }

    /* ------------------------------------------------------------------ */
    /* Release timeline                                                     */
    /* ------------------------------------------------------------------ */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin: 22px 0;
      box-shadow: var(--shadow-sm);
    }

    .timeline-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .timeline-track {
      display: flex;
      align-items: flex-start;
    }

    .milestone {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    /* connector line to the right of each milestone except the last */
    .milestone:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 13px;
      left: calc(50% + 14px);
      right: calc(-50% + 14px);
      height: 3px;
      background: var(--border);
      z-index: 0;
    }

    .milestone.ms-done:not(:last-child)::after  { background: #2e7d32; }
    .milestone.ms-active:not(:last-child)::after { background: var(--brand); }

    .ms-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .milestone.ms-done .ms-circle {
      background: #2e7d32;
      color: #fff;
      border: 2px solid #2e7d32;
    }

    .milestone.ms-active .ms-circle {
      background: var(--brand);
      color: #fff;
      border: 2px solid var(--brand);
    }

    .milestone.ms-upcoming .ms-circle {
      background: var(--surface);
      color: var(--text-muted);
      border: 2px solid var(--border);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.65; }
      70%  { transform: scale(1.9); opacity: 0; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    .milestone.ms-active .ms-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--brand);
      animation: pulse-ring 2s ease-out infinite;
    }

    .ms-label {
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 6px;
      color: var(--text);
      text-align: center;
    }

    .milestone.ms-upcoming .ms-label { color: var(--text-muted); }

    .ms-sub {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 2px;
      text-align: center;
    }

    /* ------------------------------------------------------------------ */
    /* PR2 priority badge                                                   */
    /* ------------------------------------------------------------------ */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      background: var(--brand);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ------------------------------------------------------------------ */
    /* Legend                                                               */
    /* ------------------------------------------------------------------ */
    .legend {
      margin-top: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
    }

    .legend-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 11px;
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 24px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Footer                                                               */
    /* ------------------------------------------------------------------ */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
  </style>
</head>

<header>
  <h1>Margo Roadmap Dashboard</h1>
  <div class="header-meta">
    <span class="badge" id="badge-release"></span>
    <span class="badge" id="badge-next"></span>
    <span class="badge" id="badge-updated"></span>
  </div>
</header>

<main>
  <div class="summary">
    <div class="summary-top">
      <span class="summary-label">Overall completion</span>
      <span class="summary-count" id="sum-text"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="summary-footer">
      <span class="pct-label" id="sum-pct"></span>
    </div>
  </div>

  <div class="themes" id="themes"></div>

  <div class="timeline-section" id="timeline"></div>

  <div class="legend">
    <div class="legend-title">Status legend</div>
    <div class="legend-items" id="legend-items"></div>
  </div>
</main>

<footer>
  Generated by the Margo roadmap dashboard generator &middot; Data sourced from GitHub Projects
</footer>

<script>
(function () {
  'use strict';

  var _d    = window.__DASHBOARD__;
  var items = _d.items;
  var meta  = _d.meta;

  /* -------------------------------------------------------------------- */
  /* Canonical state resolution                                             */
  /* meta.statusMap maps raw GitHub column names → one of the five states  */
  /* -------------------------------------------------------------------- */
  var statusMap = meta.statusMap || {};

  function canonical(rawStatus) {
    if (!rawStatus) return null;
    return statusMap[rawStatus] || rawStatus;
  }

  /* -------------------------------------------------------------------- */
  /* Five-state colour map (keyed on canonical state names)                */
  /* -------------------------------------------------------------------- */
  var CANONICAL_BG = {
    'Finished':         '#1B5E20',
    'SUP Accepted':     '#66BB6A',
    'SUP Initiated':    '#FF9800',
    'Owner Identified': '#90CAF9',
    'No Owner':         '#E0E0E0',
  };

  // Canonical states whose background requires white text.
  var CANONICAL_DARK = { 'Finished': true };

  // Canonical states counted as "done" for the progress bar.
  var DONE_CANONICAL = { 'Finished': true };

  // Sort order within panels: most-progressed first.
  var CANONICAL_ORDER = {
    'Finished':         0,
    'SUP Accepted':     1,
    'SUP Initiated':    2,
    'Owner Identified': 3,
    'No Owner':         4,
  };

  function statusRank(rawStatus) {
    var c = canonical(rawStatus);
    return CANONICAL_ORDER[c] != null ? CANONICAL_ORDER[c] : 99;
  }

  /* -------------------------------------------------------------------- */
  /* Header badges                                                          */
  /* -------------------------------------------------------------------- */
  setText('badge-release', 'Current release: ' + (meta.currentRelease  || '—'));
  setText('badge-next',    'Next release: '     + (meta.nextReleaseDate || '—'));
  setText('badge-updated', 'Updated: '          + meta.generatedAt);

  /* -------------------------------------------------------------------- */
  /* Summary bar                                                            */
  /* -------------------------------------------------------------------- */
  var total    = items.length;
  var finished = items.filter(function (i) { return DONE_CANONICAL[canonical(i.status)]; }).length;
  var pct      = total > 0 ? Math.round((finished / total) * 100) : 0;

  setText('sum-text', finished + ' of ' + total + ' items complete');
  setText('sum-pct',  pct + '%');

  requestAnimationFrame(function () {
    document.getElementById('progress-fill').style.width = pct + '%';
  });

  /* -------------------------------------------------------------------- */
  /* Build panel definitions from config                                    */
  /* Switch config.groupBy from "source" → "theme" once Theme fields       */
  /* are added to the GitHub projects; no template change needed.           */
  /* -------------------------------------------------------------------- */
  var panelDefs;
  if (meta.groupBy === 'source') {
    panelDefs = Object.keys(meta.projects || {}).map(function (key) {
      return {
        label:    (meta.projects[key] || {}).label || key,
        filterFn: function (i) { return i.source === key; },
      };
    });
  } else {
    panelDefs = (meta.themes || []).map(function (theme) {
      return {
        label:    theme,
        filterFn: function (i) { return i.theme === theme; },
      };
    });
  }

  /* -------------------------------------------------------------------- */
  /* Render panels                                                          */
  /* -------------------------------------------------------------------- */
  var container = document.getElementById('themes');

  panelDefs.forEach(function (def) {
    var panelItems = items
      .filter(def.filterFn)
      .slice()
      .sort(function (a, b) { return statusRank(a.status) - statusRank(b.status); });

    var panel = make('div', 'panel');

    var hd = make('div', 'panel-header');
    hd.innerHTML =
      '<span class="panel-title">' + esc(def.label) + '</span>' +
      '<span class="panel-count">' + panelItems.length +
        (panelItems.length === 1 ? ' item' : ' items') + '</span>';
    panel.appendChild(hd);

    var list = make('div', 'tile-list');
    if (panelItems.length === 0) {
      var empty = make('div', 'empty-panel');
      empty.textContent = 'No items';
      list.appendChild(empty);
    } else {
      panelItems.forEach(function (item) {
        list.appendChild(buildTile(item));
      });
    }

    panel.appendChild(list);
    container.appendChild(panel);
  });

  /* -------------------------------------------------------------------- */
  /* Tile builder                                                           */
  /* -------------------------------------------------------------------- */
  function buildTile(item) {
    var c    = canonical(item.status);
    var tile = make('div', 'tile');
    tile.style.background = CANONICAL_BG[c] || '#e8eef7';
    if (CANONICAL_DARK[c]) tile.classList.add('tile-dark');

    var pr2Badge = (item.status === 'PR2 Core Scope Features')
      ? '<span class="priority-badge">PR2</span>'
      : '';

    var head = make('div', 'tile-head');
    head.innerHTML =
      '<div class="tile-dot"></div>' +
      '<div class="tile-name">' + esc(item.title || '(untitled)') + pr2Badge + '</div>' +
      '<div class="tile-arrow">&#9658;</div>';
    tile.appendChild(head);

    var body = make('div', 'tile-body');
    body.innerHTML =
      drow('Status',       c)                    +
      drow('Type',         item.type)             +
      drow('SUP required', item.supRequired)      +
      drow('Target date',  item.targetDate)       +
      drow('Release',      item.release)          +
      drow('Source',       srcLabel(item.source)) +
      (item.url
        ? '<a class="gh-link" href="' + esc(item.url) +
          '" target="_blank" rel="noopener">View on GitHub &#8599;</a>'
        : '');
    tile.appendChild(body);

    head.addEventListener('click', function () { tile.classList.toggle('open'); });
    return tile;
  }

  function drow(label, value) {
    if (value == null || value === '') return '';
    return '<div class="detail-row">' +
      '<span class="detail-label">' + esc(label)         + '</span>' +
      '<span class="detail-value">' + esc(String(value)) + '</span>' +
      '</div>';
  }

  function srcLabel(src) {
    var p = (meta.projects || {})[src];
    return p ? p.label : (src || null);
  }

  /* -------------------------------------------------------------------- */
  /* Release timeline                                                       */
  /* -------------------------------------------------------------------- */
  var timelineEl = document.getElementById('timeline');
  if (timelineEl && (meta.releases || []).length > 0) {
    var releases = meta.releases;
    var current  = meta.currentRelease;
    var currentIdx = releases.indexOf(current);

    timelineEl.innerHTML =
      '<div class="timeline-title">Release Journey</div>' +
      '<div class="timeline-track" id="timeline-track"></div>';

    var track = document.getElementById('timeline-track');

    releases.forEach(function (rel, idx) {
      var state;
      if (idx < currentIdx)       state = 'ms-done';
      else if (idx === currentIdx) state = 'ms-active';
      else                         state = 'ms-upcoming';

      var circleContent = (state === 'ms-done') ? '&#10003;' : esc(rel);

      var subText = '';
      if (state === 'ms-active' && meta.nextReleaseDate) {
        subText = meta.nextReleaseDate;
      } else if (idx === releases.length - 1) {
        subText = 'Target';
      }

      var ms = make('div', 'milestone ' + state);
      ms.innerHTML =
        '<div class="ms-circle">' + circleContent + '</div>' +
        '<div class="ms-label">' + esc(rel) + '</div>' +
        (subText ? '<div class="ms-sub">' + esc(subText) + '</div>' : '');
      track.appendChild(ms);
    });
  }

  /* -------------------------------------------------------------------- */
  /* Legend — five canonical states                                         */
  /* -------------------------------------------------------------------- */
  var legendEl = document.getElementById('legend-items');
  if (legendEl) {
    Object.keys(CANONICAL_BG).forEach(function (state) {
      var item = make('div', 'legend-item');
      var sw   = make('div', 'swatch');
      sw.style.background = CANONICAL_BG[state];
      item.appendChild(sw);
      item.appendChild(document.createTextNode(state));
      legendEl.appendChild(item);
    });
  }

  /* -------------------------------------------------------------------- */
  /* Utilities                                                              */
  /* -------------------------------------------------------------------- */
  function setText(id, text) {
    var el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function make(tag, cls) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    return el;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

}());
</script>

</body>
