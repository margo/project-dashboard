<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margo Roadmap Dashboard</title>
  <style>
    /* ============================================================
       Design tokens
    ============================================================ */
    :root {
      --brand:       #00358C;
      --brand-dk:    #002570;
      --text:        #111827;
      --muted:       #6b7280;
      --bg:          #f0f4f9;
      --surface:     #ffffff;
      --border:      #d1dce8;
      --radius:      10px;
      --shadow:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    }

    /* ============================================================
       Reset & base
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ============================================================
       Header
    ============================================================ */
    header {
      background: var(--brand);
      color: #fff;
      padding: 18px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 10px rgba(0,0,60,.28);
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.3px;
      line-height: 1.2;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .77rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ============================================================
       Main container
    ============================================================ */
    main {
      max-width: 1400px;
      margin: 0 auto;
      /* extra bottom padding keeps content clear of the sticky legend bar */
      padding: 24px 16px 120px;
    }

    /* ============================================================
       Release timeline (global — sits above the tabs)
    ============================================================ */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .timeline-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .timeline-track { display: flex; align-items: flex-start; }

    .milestone {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    /* Connector line between milestones */
    .milestone:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 13px;
      left: calc(50% + 14px);
      right: calc(-50% + 14px);
      height: 3px;
      background: var(--border);
      z-index: 0;
    }
    .milestone.ms-done:not(:last-child)::after   { background: #2e7d32; }
    .milestone.ms-active:not(:last-child)::after { background: var(--brand); }

    .ms-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .milestone.ms-done .ms-circle {
      background: #2e7d32;
      color: #fff;
      border: 2px solid #2e7d32;
    }
    .milestone.ms-active .ms-circle {
      background: var(--brand);
      color: #fff;
      border: 2px solid var(--brand);
    }
    .milestone.ms-upcoming .ms-circle {
      background: var(--surface);
      color: var(--muted);
      border: 2px solid var(--border);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: .65; }
      70%  { transform: scale(1.9); opacity: 0; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    .milestone.ms-active .ms-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--brand);
      animation: pulse-ring 2s ease-out infinite;
    }

    .ms-label {
      font-size: .78rem;
      font-weight: 600;
      margin-top: 6px;
      color: var(--text);
      text-align: center;
    }
    .milestone.ms-upcoming .ms-label { color: var(--muted); }

    .ms-sub {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: center;
    }

    /* Milestone tooltip */
    .ms-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #1E1E1E;
      color: #fff;
      font-size: .74rem;
      line-height: 1.45;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: pre-line;
      pointer-events: none;
      box-shadow: 0 3px 12px rgba(0,0,0,.35);
      z-index: 100;
      opacity: 0;
      transition: opacity .15s ease;
      width: max-content;
      max-width: 240px;
      text-align: center;
    }
    /* Arrow pointing downward toward the circle */
    .ms-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #1E1E1E;
    }
    .milestone:hover .ms-tooltip   { opacity: 1; }
    .milestone.has-link             { cursor: pointer; }

    /* ============================================================
       Tab bar
    ============================================================ */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .tab-btn {
      flex: 1;
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-align: center;
      white-space: nowrap;
    }
    .tab-btn:hover:not(.active) { background: var(--bg); }
    .tab-btn.active {
      background: var(--brand);
      color: #fff;
      font-weight: 600;
    }

    /* ============================================================
       Tab panels
    ============================================================ */
    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ============================================================
       Per-tab summary bar
    ============================================================ */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .summary-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
    }

    .summary-count { font-size: .88rem; color: var(--muted); }

    .progress-track {
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2e7d32, #1B5E20);
      border-radius: 5px;
      width: 0%;
      transition: width .9s cubic-bezier(.4,0,.2,1);
    }

    .summary-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 7px;
    }

    .pct-label { font-size: .88rem; font-weight: 700; color: #1B5E20; }

    /* ============================================================
       Theme section — wraps all rows in a tab
    ============================================================ */
    .theme-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ============================================================
       Theme row  (label col + tiles grid)
    ============================================================ */
    .theme-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    /* Red border when the row contains PR2 Core Scope items */
    .theme-row.pr2-focus {
      border: 2px solid #d32f2f;
    }

    /* Left label column */
    .theme-label-col {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      gap: 4px;
      text-align: center;
      border-right: 1px solid var(--border);
      /* thick colour left-border overridden per theme below */
      border-left: 5px solid var(--border);
    }

    .theme-label-col .label-text {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text);
      word-break: break-word;
    }

    .theme-label-col .label-count {
      font-size: .68rem;
      color: var(--muted);
    }

    /* Per-theme left-border colours */
    .theme-col-trust       { border-left-color: #E53935; }
    .theme-col-flexibility { border-left-color: #1E88E5; }
    .theme-col-robustness  { border-left-color: #8E24AA; }
    .theme-col-unassigned  { border-left-color: #9E9E9E; }

    /* Tiles grid area */
    .theme-tiles {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 6px;
      padding: 8px;
      min-width: 0;
      align-content: start;
    }

    /* ============================================================
       Status tiles
    ============================================================ */
    .tile {
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.09);
      cursor: pointer;
      user-select: none;
      transition: box-shadow .15s;
    }

    .tile:hover  { box-shadow: 0 3px 10px rgba(0,0,0,.14); }
    .tile:active { opacity: .92; }

    /* SUP Required = No — thick black inset outline (layout unaffected) */
    .tile.sup-no { outline: 3px solid #111827; outline-offset: -1px; }

    .tile-head {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 11px;
    }

    .tile-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,.18);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .tile-name {
      flex: 1;
      font-size: .82rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .tile-arrow {
      font-size: .6rem;
      opacity: .5;
      flex-shrink: 0;
      margin-top: 4px;
      transition: transform .18s;
    }

    .tile.open .tile-arrow { transform: rotate(90deg); }

    /* Expandable detail body */
    .tile-body {
      display: none;
      padding: 9px 11px 11px;
      border-top: 1px solid rgba(0,0,0,.1);
      font-size: .78rem;
    }

    .tile.open .tile-body { display: block; }

    .detail-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .detail-row:last-of-type { margin-bottom: 0; }

    .detail-label {
      font-weight: 600;
      color: rgba(0,0,0,.42);
      min-width: 88px;
      flex-shrink: 0;
    }

    .detail-value { color: rgba(0,0,0,.78); }

    .gh-link {
      display: inline-block;
      margin-top: 10px;
      font-size: .77rem;
      color: var(--brand);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,53,140,.35);
      word-break: break-all;
    }
    .gh-link:hover { border-bottom-color: var(--brand); }

    /* Dark-tile overrides (white text on dark backgrounds) */
    .tile-dark .tile-body      { border-top-color: rgba(255,255,255,.18); }
    .tile-dark .tile-dot       { background: rgba(255,255,255,.35); }
    .tile-dark .tile-name      { color: rgba(255,255,255,.95); }
    .tile-dark .tile-arrow     { opacity: .7; }
    .tile-dark .detail-label   { color: rgba(255,255,255,.52); }
    .tile-dark .detail-value   { color: rgba(255,255,255,.88); }
    .tile-dark .gh-link        { color: #a5d6a7; border-bottom-color: rgba(165,214,167,.4); }
    .tile-dark .gh-link:hover  { border-bottom-color: #a5d6a7; }

    /* "Untyped" badge — shown on PM Epics tiles where Type field is blank */
    .type-badge {
      display: inline-flex;
      align-items: center;
      background: #9E9E9E;
      color: #fff;
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .4px;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* PR2 priority badge */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      background: var(--brand);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .5px;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ============================================================
       Legend — sticky bar pinned to bottom of viewport
    ============================================================ */
    .legend {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(209, 220, 232, 0.9);
      box-shadow: 0 -3px 16px rgba(0, 0, 60, 0.10);
      padding: 10px 24px 12px;
    }

    .legend-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      white-space: nowrap;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,.1);
      flex-shrink: 0;
    }

    /* Secondary row: SUP border + PR2 badge explanation */
    .legend-extra {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(209, 220, 232, 0.7);
    }

    /* ============================================================
       Footer
    ============================================================ */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ============================================================
       Responsive
    ============================================================ */
    @media (max-width: 700px) {
      header           { position: static; }
      .tab-bar         { flex-direction: column; }
      .tab-btn         { text-align: left; }
      .theme-label-col { width: 80px; }
      .theme-tiles     { grid-template-columns: 1fr; }

      /* Legend: collapse each row to a single horizontally-scrollable line */
      .legend { padding: 8px 16px 10px; }

      .legend-items,
      .legend-extra {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .legend-items::-webkit-scrollbar,
      .legend-extra::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body>

<!-- __INJECT_DATA__ -->

<header>
  <h1>Margo Roadmap Dashboard</h1>
  <div class="header-meta">
    <span class="badge" id="badge-release"></span>
    <span class="badge" id="badge-next"></span>
    <span class="badge" id="badge-updated"></span>
  </div>
</header>

<main>

  <!-- Global: release timeline -->
  <div class="timeline-section" id="timeline"></div>

  <!-- Tab switcher -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="0">TWG Features</button>
    <button class="tab-btn" data-tab="1">PM Epics</button>
  </div>

  <!-- Tab panels -->
  <div id="tab-twg" class="tab-panel active" data-tab="0">
    <div class="summary">
      <div class="summary-top">
        <span class="summary-label">Completion</span>
        <span class="summary-count" id="sum-text-twg"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-twg"></div>
      </div>
      <div class="summary-footer">
        <span class="pct-label" id="sum-pct-twg"></span>
      </div>
    </div>
    <div class="theme-section" id="themes-twg"></div>
  </div>

  <div id="tab-pm" class="tab-panel" data-tab="1">
    <div class="summary">
      <div class="summary-top">
        <span class="summary-label">Completion</span>
        <span class="summary-count" id="sum-text-pm"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-pm"></div>
      </div>
      <div class="summary-footer">
        <span class="pct-label" id="sum-pct-pm"></span>
      </div>
    </div>
    <div class="theme-section" id="themes-pm"></div>
  </div>

  <!-- Global: status legend -->
  <div class="legend">
    <div class="legend-title">Status legend</div>
    <div class="legend-items" id="legend-items"></div>
    <div class="legend-extra" id="legend-extra"></div>
  </div>

</main>

<footer>
  Generated by the Margo roadmap dashboard generator &middot; Data sourced from GitHub Projects
</footer>

<script>
(function () {
  'use strict';

  var _d    = window.__DASHBOARD__;
  var items = _d.items;
  var meta  = _d.meta;

  /* ------------------------------------------------------------------
     Canonical status resolution
  ------------------------------------------------------------------ */
  var statusMap = meta.statusMap || {};

  function canonical(raw) {
    if (!raw) return null;
    return statusMap[raw] || raw;
  }

  /* ------------------------------------------------------------------
     Five-state colour map
  ------------------------------------------------------------------ */
  var CANONICAL_BG = {
    'Finished':         '#1B5E20',   // dark green  → white text (tile-dark)
    'SUP Accepted':     '#66BB6A',   // mid green   → black text
    'SUP Initiated':    '#FF9800',   // orange      → black text
    'Owner Identified': '#FFD600',   // yellow      → black text
    'No Owner':         '#E0E0E0',   // light grey  → black text
  };

  var CANONICAL_DARK  = { 'Finished': true };
  var DONE_CANONICAL  = { 'Finished': true };
  var CANONICAL_ORDER = {
    'Finished': 0, 'SUP Accepted': 1, 'SUP Initiated': 2,
    'Owner Identified': 3, 'No Owner': 4,
  };

  function statusRank(raw) {
    var c = canonical(raw);
    return CANONICAL_ORDER[c] != null ? CANONICAL_ORDER[c] : 99;
  }

  /* ------------------------------------------------------------------
     Theme config
  ------------------------------------------------------------------ */
  var KNOWN_THEMES = meta.themes || [];
  // Render known themes in order, then catch-all Unassigned at bottom
  var THEME_KEYS = KNOWN_THEMES.concat(['Unassigned']);

  var THEME_CSS = {
    'Trust':       'trust',
    'Flexibility': 'flexibility',
    'Robustness':  'robustness',
    'Unassigned':  'unassigned',
  };

  /* ------------------------------------------------------------------
     Tab definitions
  ------------------------------------------------------------------ */
  var TABS = [
    { key: 'twg', label: 'TWG Features',
      filter: function (i) { return i.source === 'twg'; } },
    { key: 'pm',  label: 'PM Epics',
      // Show Child Epics only; items with no Type set are included but
      // flagged with an "Untyped" badge so incomplete tagging is visible.
      filter: function (i) {
        return i.source === 'pm' &&
               (i.type === 'Child Epic' || !i.type);
      } },
  ];
  var DEFAULT_TAB = 0; // TWG Features

  /* ------------------------------------------------------------------
     Header badges
  ------------------------------------------------------------------ */
  setText('badge-release', 'Current release: ' + (meta.currentRelease  || '\u2014'));
  setText('badge-next',    'Next release: '     + (meta.nextReleaseDate || '\u2014'));
  setText('badge-updated', 'Updated: '          + meta.generatedAt);

  /* ------------------------------------------------------------------
     Release timeline (global) — with tooltips and clickable milestones
  ------------------------------------------------------------------ */
  (function renderTimeline() {
    var el = document.getElementById('timeline');
    if (!el || !(meta.releases || []).length) return;

    var releases          = meta.releases;
    var currentIdx        = releases.indexOf(meta.currentRelease);
    var releaseDates      = meta.releaseDates      || {};
    var milestoneLinks    = meta.milestoneLinks    || {};
    var milestoneTooltips = meta.milestoneTooltips || {};

    el.innerHTML = '<div class="timeline-title">Release Journey</div>' +
                   '<div class="timeline-track" id="tl-track"></div>';

    var track = document.getElementById('tl-track');

    releases.forEach(function (rel, idx) {
      var state  = idx < currentIdx  ? 'ms-done'
                 : idx === currentIdx ? 'ms-active'
                 : 'ms-upcoming';
      var circle = state === 'ms-done' ? '&#10003;' : esc(rel);

      // Sub-label under the circle
      var sub = '';
      if (state === 'ms-done' && releaseDates[rel]) {
        sub = releaseDates[rel];
      } else if (state === 'ms-active' && meta.nextReleaseDate) {
        sub = meta.nextReleaseDate;
      } else if (state === 'ms-upcoming' && releaseDates[rel]) {
        sub = releaseDates[rel];
      }

      // Tooltip text — replace {nextReleaseDate} placeholder
      var rawTip = milestoneTooltips[rel] || '';
      var tipText = rawTip.replace('{nextReleaseDate}', meta.nextReleaseDate || '\u2014');

      var hasLink = !!milestoneLinks[rel];
      var ms = make('div', 'milestone ' + state + (hasLink ? ' has-link' : ''));

      ms.innerHTML =
        '<div class="ms-circle">' + circle + '</div>' +
        '<div class="ms-label">'  + esc(rel) + '</div>' +
        (sub     ? '<div class="ms-sub">'     + esc(sub)     + '</div>' : '') +
        (tipText ? '<div class="ms-tooltip">' + esc(tipText) + '</div>' : '');

      if (hasLink) {
        ms.addEventListener('click', function () {
          window.open(milestoneLinks[rel], '_blank', 'noopener,noreferrer');
        });
      }

      track.appendChild(ms);
    });
  }());

  /* ------------------------------------------------------------------
     Wire up tab buttons
  ------------------------------------------------------------------ */
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      switchTab(parseInt(btn.dataset.tab, 10));
    });
  });

  function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', parseInt(b.dataset.tab, 10) === idx);
    });
    document.querySelectorAll('.tab-panel').forEach(function (p) {
      var becoming = parseInt(p.dataset.tab, 10) === idx;
      var wasHidden = !p.classList.contains('active');
      p.classList.toggle('active', becoming);
      // Trigger progress-bar animation when panel first becomes visible
      if (becoming && wasHidden) {
        var tab = TABS[idx];
        animateFill(tab.key, items.filter(tab.filter));
      }
    });
  }

  /* ------------------------------------------------------------------
     Populate each tab panel
  ------------------------------------------------------------------ */
  TABS.forEach(function (tab, idx) {
    var tabItems = items.filter(tab.filter);

    // Summary counts
    var done = tabItems.filter(function (i) {
      return DONE_CANONICAL[canonical(i.status)];
    }).length;
    var pct = tabItems.length > 0
      ? Math.round((done / tabItems.length) * 100) : 0;

    setText('sum-text-' + tab.key, done + ' of ' + tabItems.length + ' items complete');
    setText('sum-pct-'  + tab.key, pct + '%');

    // Animate progress bar for the default (visible) tab immediately
    if (idx === DEFAULT_TAB) {
      requestAnimationFrame(function () { animateFill(tab.key, tabItems); });
    }

    // Build theme rows
    var container = document.getElementById('themes-' + tab.key);
    if (container) renderThemeSection(tabItems, container);
  });

  function animateFill(key, tabItems) {
    var done = tabItems.filter(function (i) {
      return DONE_CANONICAL[canonical(i.status)];
    }).length;
    var pct = tabItems.length > 0
      ? Math.round((done / tabItems.length) * 100) : 0;
    var el = document.getElementById('fill-' + key);
    if (el) el.style.width = pct + '%';
  }

  /* ------------------------------------------------------------------
     Theme section renderer
  ------------------------------------------------------------------ */
  function renderThemeSection(tabItems, container) {
    THEME_KEYS.forEach(function (theme) {
      // Filter items for this theme bucket
      var themeItems = tabItems.filter(function (i) {
        if (theme === 'Unassigned') {
          return !i.theme || KNOWN_THEMES.indexOf(i.theme) === -1;
        }
        return i.theme === theme;
      });

      if (themeItems.length === 0) return; // skip empty rows

      // Sort within row: most-progressed status first
      themeItems = themeItems.slice().sort(function (a, b) {
        return statusRank(a.status) - statusRank(b.status);
      });

      var hasPr2 = themeItems.some(function (i) {
        return i.status === 'PR2 Core Scope Features';
      });

      var cssKey = THEME_CSS[theme] || 'unassigned';
      var row    = make('div', 'theme-row' + (hasPr2 ? ' pr2-focus' : ''));

      // Label column
      var labelCol = make('div', 'theme-label-col theme-col-' + cssKey);
      labelCol.innerHTML =
        '<span class="label-text">' + esc(theme) + '</span>' +
        '<span class="label-count">' + themeItems.length +
          (themeItems.length === 1 ? ' item' : ' items') + '</span>';
      row.appendChild(labelCol);

      // Tiles grid
      var grid = make('div', 'theme-tiles');
      themeItems.forEach(function (item) {
        grid.appendChild(buildTile(item));
      });
      row.appendChild(grid);

      container.appendChild(row);
    });
  }

  /* ------------------------------------------------------------------
     Tile builder
  ------------------------------------------------------------------ */
  function buildTile(item) {
    var c   = canonical(item.status);
    var cls = 'tile';
    if (CANONICAL_DARK[c])         cls += ' tile-dark';
    if (item.supRequired === 'No') cls += ' sup-no';

    var tile = make('div', cls);
    tile.style.background = CANONICAL_BG[c] || '#e8eef7';

    var pr2Badge     = (item.status === 'PR2 Core Scope Features')
      ? '<span class="priority-badge">PR2</span>' : '';
    // Show Untyped badge on PM items where the Type field is not set,
    // signalling that tagging is incomplete.
    var untypedBadge = (item.source === 'pm' && !item.type)
      ? '<span class="type-badge">Untyped</span>' : '';

    var head = make('div', 'tile-head');
    head.innerHTML =
      '<div class="tile-dot"></div>' +
      '<div class="tile-name">' + esc(item.title || '(untitled)') + pr2Badge + untypedBadge + '</div>' +
      '<div class="tile-arrow">&#9658;</div>';
    tile.appendChild(head);

    var body = make('div', 'tile-body');
    body.innerHTML =
      drow('Status',       c)                    +
      drow('Theme',        item.theme)            +
      drow('Type',         item.type)             +
      drow('SUP required', item.supRequired)      +
      drow('Target date',  item.targetDate)       +
      drow('Release',      item.release)          +
      drow('Source',       srcLabel(item.source)) +
      (item.url
        ? '<a class="gh-link" href="' + esc(item.url) +
          '" target="_blank" rel="noopener">View on GitHub &#8599;</a>'
        : '');
    tile.appendChild(body);

    head.addEventListener('click', function () { tile.classList.toggle('open'); });
    return tile;
  }

  /* ------------------------------------------------------------------
     Legend
  ------------------------------------------------------------------ */
  var legendEl = document.getElementById('legend-items');
  if (legendEl) {
    Object.keys(CANONICAL_BG).forEach(function (state) {
      var li = make('div', 'legend-item');
      var sw = make('div', 'swatch');
      sw.style.background = CANONICAL_BG[state];
      li.appendChild(sw);
      li.appendChild(document.createTextNode(state));
      legendEl.appendChild(li);
    });
  }

  var legendExtra = document.getElementById('legend-extra');
  if (legendExtra) {
    // SUP Required = No border
    var supLi = make('div', 'legend-item');
    var supSw = make('div', 'swatch');
    supSw.style.background    = '#e8eef7';
    supSw.style.outline       = '3px solid #111827';
    supSw.style.outlineOffset = '-1px';
    supLi.appendChild(supSw);
    supLi.appendChild(document.createTextNode('SUP Required = No'));
    legendExtra.appendChild(supLi);

    // PR2 focus row border
    var focusLi = make('div', 'legend-item');
    var focusSw = make('div', 'swatch');
    focusSw.style.background = 'transparent';
    focusSw.style.border     = '2px solid #d32f2f';
    focusLi.appendChild(focusSw);
    focusLi.appendChild(document.createTextNode('PR2 focus theme row'));
    legendExtra.appendChild(focusLi);

    // PR2 badge
    var badgeLi = make('div', 'legend-item');
    var badge   = make('span', 'priority-badge');
    badge.textContent = 'PR2';
    badgeLi.appendChild(badge);
    badgeLi.appendChild(document.createTextNode('\u00a0Core Scope item'));
    legendExtra.appendChild(badgeLi);
  }

  /* ------------------------------------------------------------------
     Utilities
  ------------------------------------------------------------------ */
  function setText(id, txt) {
    var el = document.getElementById(id);
    if (el) el.textContent = txt;
  }

  function make(tag, cls) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    return el;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function drow(label, value) {
    if (value == null || value === '') return '';
    return '<div class="detail-row">' +
      '<span class="detail-label">' + esc(label)         + '</span>' +
      '<span class="detail-value">' + esc(String(value)) + '</span>' +
      '</div>';
  }

  function srcLabel(src) {
    var p = (meta.projects || {})[src];
    return p ? p.label : (src || null);
  }

}());
</script>

</body>
</html>
