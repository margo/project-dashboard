<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margo Roadmap Dashboard</title>
  <style>
    /* ============================================================
       Design tokens
    ============================================================ */
    :root {
      --brand:       #00358C;
      --brand-dk:    #002570;
      --text:        #111827;
      --muted:       #6b7280;
      --bg:          #f0f4f9;
      --surface:     #ffffff;
      --border:      #d1dce8;
      --radius:      10px;
      --shadow:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    }

    /* ============================================================
       Reset & base
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ============================================================
       Header
    ============================================================ */
    header {
      background: var(--brand);
      color: #fff;
      padding: 18px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 10px rgba(0,0,60,.28);
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.3px;
      line-height: 1.2;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .77rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ============================================================
       Main container
    ============================================================ */
    main {
      max-width: 1400px;
      margin: 0 auto;
      /* extra bottom padding keeps content clear of the sticky legend bar */
      padding: 24px 16px 120px;
    }

    /* ============================================================
       Release timeline (global — sits above the tabs)
    ============================================================ */
    .timeline-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .timeline-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .rj-info-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: rgba(0,0,0,.12); color: rgba(0,0,0,.5);
      font-size: .62rem; font-weight: 700; font-style: normal;
      cursor: pointer; flex-shrink: 0; text-transform: none; letter-spacing: 0;
    }
    .rj-info-btn:hover { background: rgba(0,0,0,.22); }

    .rj-info-callout {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: 340px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: .78rem;
      line-height: 1.55;
      color: var(--text);
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      z-index: 300;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      cursor: default;
    }
    .rj-info-callout::before {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 14px;
      border: 7px solid transparent;
      border-bottom-color: var(--border);
    }
    .rj-info-callout::after {
      content: '';
      position: absolute;
      bottom: calc(100% - 1px);
      left: 14px;
      border: 7px solid transparent;
      border-bottom-color: #fff;
    }
    .rj-section + .rj-section { margin-top: 12px; }
    .rj-section-heading {
      font-weight: 700; font-size: .8rem; color: var(--text); margin-bottom: 3px;
    }
    .rj-section-intro { color: var(--muted); margin-bottom: 4px; }
    .rj-section-list { margin: 0; padding-left: 16px; color: var(--text); }
    .rj-section-list li { margin-bottom: 3px; }
    .rj-section-list li:last-child { margin-bottom: 0; }
    .timeline-title.rj-open .rj-info-callout { display: block; }

    .timeline-track { display: flex; align-items: flex-start; }

    .milestone {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    /* Connector line between milestones */
    .milestone:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 13px;
      left: calc(50% + 14px);
      right: calc(-50% + 14px);
      height: 3px;
      background: var(--border);
      z-index: 0;
    }
    .milestone.ms-done:not(:last-child)::after   { background: #2e7d32; }
    .milestone.ms-active:not(:last-child)::after { background: var(--brand); }

    .ms-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .milestone.ms-done .ms-circle {
      background: #2e7d32;
      color: #fff;
      border: 2px solid #2e7d32;
    }
    .milestone.ms-active .ms-circle {
      background: var(--brand);
      color: #fff;
      border: 2px solid var(--brand);
    }
    .milestone.ms-upcoming .ms-circle {
      background: var(--surface);
      color: var(--muted);
      border: 2px solid var(--border);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: .65; }
      70%  { transform: scale(1.9); opacity: 0; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    .milestone.ms-active .ms-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--brand);
      animation: pulse-ring 2s ease-out infinite;
    }

    .ms-label {
      font-size: .78rem;
      font-weight: 600;
      margin-top: 6px;
      color: var(--text);
      text-align: center;
    }
    .milestone.ms-upcoming .ms-label { color: var(--muted); }

    .ms-sub {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: center;
    }

    /* Milestone tooltip */
    .ms-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #1E1E1E;
      color: #fff;
      font-size: .74rem;
      line-height: 1.45;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: pre-line;
      pointer-events: none;
      box-shadow: 0 3px 12px rgba(0,0,0,.35);
      z-index: 100;
      opacity: 0;
      transition: opacity .15s ease;
      width: max-content;
      max-width: 240px;
      text-align: center;
    }
    /* Arrow pointing downward toward the circle */
    .ms-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #1E1E1E;
    }
    .milestone:hover .ms-tooltip   { opacity: 1; }
    .milestone.has-link             { cursor: pointer; }

    /* Purpose & Scope click-callout on milestone */
    .ms-scope-btn {
      display: inline-block;
      margin-top: 5px;
      font-size: .65rem;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      border-bottom: 1px solid rgba(0,53,140,.28);
      letter-spacing: .01em;
    }
    .ms-scope-btn:hover { border-bottom-color: var(--brand); }

    .ms-scope-callout {
      display: none;
      position: absolute;
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .78rem;
      line-height: 1.55;
      color: var(--text);
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      z-index: 300;
      text-align: left;
      cursor: default;
    }
    /* Arrow pointing up toward the milestone */
    .ms-scope-callout::before {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-bottom-color: var(--border);
    }
    .ms-scope-callout::after {
      content: '';
      position: absolute;
      bottom: calc(100% - 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-bottom-color: #fff;
    }
    .ms-scope-title {
      font-weight: 700;
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .milestone.scope-open .ms-scope-callout { display: block; }

    /* ============================================================
       Tab bar
    ============================================================ */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .tab-btn {
      flex: 1;
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-align: center;
      white-space: nowrap;
    }
    .tab-btn:hover:not(.active) { background: var(--bg); }
    .tab-btn.active {
      background: var(--brand);
      color: #fff;
      font-weight: 600;
    }

    /* ============================================================
       Tab panels
    ============================================================ */
    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ============================================================
       Per-tab summary bar
    ============================================================ */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .summary-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
    }

    .summary-count { font-size: .88rem; color: var(--muted); }

    .progress-track {
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2e7d32, #1B5E20);
      border-radius: 5px;
      width: 0%;
      transition: width .9s cubic-bezier(.4,0,.2,1);
    }

    .summary-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 7px;
    }

    .pct-label { font-size: .88rem; font-weight: 700; color: #1B5E20; }

    /* ============================================================
       Theme section — wraps all rows in a tab
    ============================================================ */
    .theme-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ============================================================
       Theme row  (label col + tiles grid)
    ============================================================ */
    .theme-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    /* Red border when the row contains PR2 Core Scope items */
    .theme-row.pr2-focus {
      border: 2px solid #d32f2f;
    }

    /* Left label column */
    .theme-label-col {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      gap: 4px;
      text-align: center;
      border-right: 1px solid var(--border);
      /* thick colour left-border overridden per theme below */
      border-left: 5px solid var(--border);
    }

    .theme-label-col .label-text {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text);
      word-break: break-word;
    }

    .theme-label-col .label-count {
      font-size: .68rem;
      color: var(--muted);
    }

    /* Per-theme left-border colours */
    .theme-col-trust       { border-left-color: #E53935; }
    .theme-col-flexibility { border-left-color: #1E88E5; }
    .theme-col-robustness  { border-left-color: #8E24AA; }
    .theme-col-unassigned  { border-left-color: #9E9E9E; }

    /* Theme description tooltip — appears above the label col on hover */
    .theme-label-col { position: relative; }

    .theme-info-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: rgba(0,0,0,.1); color: rgba(0,0,0,.5);
      font-size: .62rem; font-weight: 700; font-style: normal;
      cursor: default; margin-top: 4px; flex-shrink: 0;
    }
    .theme-label-col:hover .theme-info-icon { background: rgba(0,0,0,.18); }

    .theme-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 0;
      top: auto;
      transform: none;
      z-index: 200;
      width: 290px;
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .78rem;
      line-height: 1.5;
      box-shadow: 0 6px 28px rgba(0,0,0,.45);
      pointer-events: none;
      text-align: left;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    /* Arrow pointing down toward the label */
    .theme-tooltip::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 20px;
      border: 7px solid transparent;
      border-top-color: #1e293b;
    }
    .theme-tooltip-title {
      font-weight: 700; font-size: .82rem;
      color: #fff; margin-bottom: 7px;
    }
    .theme-tooltip-list {
      margin: 0; padding-left: 16px; color: #94a3b8;
    }
    .theme-tooltip-list li { margin-bottom: 4px; }
    .theme-tooltip-list li:last-child { margin-bottom: 0; }

    .theme-label-col:hover .theme-tooltip { display: block; }

    /* Tiles grid area */
    .theme-tiles {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 6px;
      padding: 8px;
      min-width: 0;
      align-content: start;
    }
    /* Flat grid — used for PM Epics (no theme-row wrapper) */
    .flat-grid { padding: 0; }

    /* ============================================================
       Status tiles
    ============================================================ */
    .tile {
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.09);
      cursor: pointer;
      user-select: none;
      transition: box-shadow .15s;
    }

    .tile:hover  { box-shadow: 0 3px 10px rgba(0,0,0,.14); }
    .tile:active { opacity: .92; }

    /* SUP Required = No — thick black inset outline (layout unaffected) */
    .tile.sup-no { outline: 3px solid #111827; outline-offset: -1px; }

    .tile-head {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 11px;
    }

    .tile-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,.18);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .tile-name {
      flex: 1;
      font-size: .82rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .tile-arrow {
      font-size: .6rem;
      opacity: .5;
      flex-shrink: 0;
      margin-top: 4px;
      transition: transform .18s;
    }

    .tile.open .tile-arrow { transform: rotate(90deg); }

    /* Expandable detail body */
    .tile-body {
      display: none;
      padding: 9px 11px 11px;
      border-top: 1px solid rgba(0,0,0,.1);
      font-size: .78rem;
    }

    .tile.open .tile-body { display: block; }

    .detail-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .detail-row:last-of-type { margin-bottom: 0; }

    .detail-label {
      font-weight: 600;
      color: rgba(0,0,0,.42);
      min-width: 88px;
      flex-shrink: 0;
    }

    .detail-value { color: rgba(0,0,0,.78); }

    .gh-link {
      display: inline-block;
      margin-top: 10px;
      font-size: .77rem;
      color: var(--brand);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,53,140,.35);
      word-break: break-all;
    }
    .gh-link:hover { border-bottom-color: var(--brand); }

    /* Dark-tile overrides (white text on dark backgrounds) */
    .tile-dark .tile-body      { border-top-color: rgba(255,255,255,.18); }
    .tile-dark .tile-dot       { background: rgba(255,255,255,.35); }
    .tile-dark .tile-name      { color: rgba(255,255,255,.95); }
    .tile-dark .tile-arrow     { opacity: .7; }
    .tile-dark .detail-label   { color: rgba(255,255,255,.52); }
    .tile-dark .detail-value   { color: rgba(255,255,255,.88); }
    .tile-dark .gh-link        { color: #a5d6a7; border-bottom-color: rgba(165,214,167,.4); }
    .tile-dark .gh-link:hover  { border-bottom-color: #a5d6a7; }

    /* Sub-issues collapsible section inside tile detail */
    .sub-issues-section { margin-top: 10px; border-top: 1px solid rgba(0,0,0,.08); padding-top: 8px; }
    .tile-dark .sub-issues-section { border-top-color: rgba(255,255,255,.14); }

    .sub-issues-toggle {
      display: flex; align-items: center; gap: 4px;
      background: none; border: none; padding: 0; cursor: pointer;
      font-size: .7rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      color: rgba(0,0,0,.42);
    }
    .tile-dark .sub-issues-toggle { color: rgba(255,255,255,.48); }
    .sub-issues-toggle:hover { color: rgba(0,0,0,.7); }
    .tile-dark .sub-issues-toggle:hover { color: rgba(255,255,255,.8); }

    .sub-issues-chevron { font-size: .6rem; transition: transform .15s; display: inline-block; }
    .sub-issues-open .sub-issues-chevron { transform: rotate(90deg); }

    .sub-issues-list { display: none; margin-top: 6px; max-height: 145px; overflow-y: auto; }
    .sub-issues-open .sub-issues-list { display: block; }

    .sub-issue-row {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 0; font-size: .78rem;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .sub-issue-row:last-child { border-bottom: none; }
    .tile-dark .sub-issue-row { border-bottom-color: rgba(255,255,255,.08); }

    .sub-issue-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .sub-issue-dot.closed { background: #1a7f37; }
    .sub-issue-dot.open   { background: transparent; border: 2px solid #1a7f37; }
    .tile-dark .sub-issue-dot.closed { background: #6bc46d; }
    .tile-dark .sub-issue-dot.open   { border-color: #6bc46d; }

    .sub-issue-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(0,0,0,.78); }
    .tile-dark .sub-issue-title { color: rgba(255,255,255,.85); }

    .sub-issue-num { color: rgba(0,0,0,.38); font-size: .72rem; flex-shrink: 0; }
    .tile-dark .sub-issue-num { color: rgba(255,255,255,.42); }

    .sub-issue-link { color: rgba(0,0,0,.38); text-decoration: none; flex-shrink: 0; font-size: .85rem; line-height: 1; }
    .sub-issue-link:hover { color: rgba(0,0,0,.8); }
    .tile-dark .sub-issue-link { color: rgba(255,255,255,.42); }
    .tile-dark .sub-issue-link:hover { color: rgba(255,255,255,.9); }

    /* "Untyped" badge — shown on PM Epics tiles where Type field is blank */
    .type-badge {
      display: inline-flex;
      align-items: center;
      background: #9E9E9E;
      color: #fff;
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .4px;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* PR1 / PR2 milestone badges */
    .priority-badge,
    .pr1-badge {
      display: inline-flex;
      align-items: center;
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .5px;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .priority-badge { background: var(--brand); }
    /* PR1 is released — muted blue-grey to signal shipped */
    .pr1-badge { background: #546E7A; }

    /* ============================================================
       Legend — sticky bar pinned to bottom of viewport
    ============================================================ */
    .legend {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(209, 220, 232, 0.9);
      box-shadow: 0 -3px 16px rgba(0, 0, 60, 0.10);
      padding: 10px 24px 12px;
    }

    .legend-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      white-space: nowrap;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,.1);
      flex-shrink: 0;
    }

    /* Secondary row: SUP border + PR2 badge explanation */
    .legend-extra {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(209, 220, 232, 0.7);
    }

    /* ============================================================
       Footer
    ============================================================ */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ============================================================
       Release pill badge — top-right corner of every tile
    ============================================================ */
    .tile { position: relative; }

    .release-pill {
      position: absolute;
      top: 7px;
      right: 8px;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
      pointer-events: none;
      white-space: nowrap;
      z-index: 1;
    }
    .release-pill.pr1 { background: #1B5E20; }
    .release-pill.pr2 { background: #00358C; }
    .release-pill.pr3 { background: #9E9E9E; }

    /* Prevent tile title from running under the pill */
    .tile-head.has-pill { padding-right: 44px; }

    /* ============================================================
       Sub-tab bar — sits inside each tab panel below the main tabs
    ============================================================ */
    .sub-tab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .sub-tab {
      padding: 5px 14px;
      border-radius: 6px 6px 0 0;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: transparent;
      color: var(--muted);
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .sub-tab:hover:not(.active) { color: var(--text); }
    .sub-tab.active {
      background: #fff;
      color: var(--brand);
      border-bottom-color: var(--brand);
      font-weight: 600;
    }

    /* Release banner — shown above tiles for PR1 / PR2 specific views */
    .release-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: var(--radius);
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: .85rem;
      font-weight: 600;
      color: #fff;
    }
    .release-banner.pr1-banner { background: #1B5E20; }
    .release-banner.pr2-banner { background: var(--brand); }

    .banner-icon { font-size: 1.1rem; flex-shrink: 0; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1;  transform: scale(1);   }
      50%       { opacity: .4; transform: scale(.65); }
    }
    .banner-pulse-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      flex-shrink: 0;
      animation: dot-pulse 1.5s ease-in-out infinite;
    }

    /* ============================================================
       Responsive
    ============================================================ */
    @media (max-width: 700px) {
      header           { position: static; }
      .tab-bar         { flex-direction: column; }
      .tab-btn         { text-align: left; }
      .theme-label-col { width: 80px; }
      .theme-tiles     { grid-template-columns: 1fr; }

      /* Legend: collapse each row to a single horizontally-scrollable line */
      .legend { padding: 8px 16px 10px; }

      .legend-items,
      .legend-extra {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .legend-items::-webkit-scrollbar,
      .legend-extra::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body>

<!-- __INJECT_DATA__ -->

<header>
  <h1>Margo Roadmap Dashboard</h1>
  <div class="header-meta">
    <span class="badge" id="badge-release"></span>
    <span class="badge" id="badge-next"></span>
    <span class="badge" id="badge-updated"></span>
  </div>
</header>

<main>

  <!-- Global: release timeline -->
  <div class="timeline-section" id="timeline"></div>

  <!-- Tab switcher -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="0">TWG Features</button>
    <button class="tab-btn" data-tab="1">PM Epics</button>
  </div>

  <!-- Tab panels -->
  <div id="tab-twg" class="tab-panel active" data-tab="0">
    <div class="summary">
      <div class="summary-top">
        <span class="summary-label">Completion</span>
        <span class="summary-count" id="sum-text-twg"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-twg"></div>
      </div>
      <div class="summary-footer">
        <span class="pct-label" id="sum-pct-twg"></span>
      </div>
    </div>
    <div class="sub-tab-bar">
      <button class="sub-tab" data-sub-tab="pr1" onclick="switchSubTab('pr1')">PR1 Completed</button>
      <button class="sub-tab active" data-sub-tab="pr2" onclick="switchSubTab('pr2')">PR2 In Progress</button>
      <button class="sub-tab" data-sub-tab="ga1" onclick="switchSubTab('ga1')">GA1</button>
    </div>
    <div id="release-banner-twg"></div>
    <div class="theme-section" id="themes-twg"></div>
  </div>

  <div id="tab-pm" class="tab-panel" data-tab="1">
    <div class="summary">
      <div class="summary-top">
        <span class="summary-label">Completion</span>
        <span class="summary-count" id="sum-text-pm"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-pm"></div>
      </div>
      <div class="summary-footer">
        <span class="pct-label" id="sum-pct-pm"></span>
      </div>
    </div>
    <div class="sub-tab-bar">
      <button class="sub-tab" data-sub-tab="pr1" onclick="switchSubTab('pr1')">PR1 Completed</button>
      <button class="sub-tab active" data-sub-tab="pr2" onclick="switchSubTab('pr2')">PR2 In Progress</button>
      <button class="sub-tab" data-sub-tab="ga1" onclick="switchSubTab('ga1')">GA1</button>
    </div>
    <div id="release-banner-pm"></div>
    <div class="theme-section" id="themes-pm"></div>
  </div>

  <!-- Global: status legend -->
  <div class="legend">
    <div class="legend-title">Status legend</div>
    <div class="legend-items" id="legend-items"></div>
    <div class="legend-extra" id="legend-extra"></div>
  </div>

</main>

<footer>
  Generated by the Margo roadmap dashboard generator &middot; Data sourced from GitHub Projects
</footer>

<script>
(function () {
  'use strict';

  var _d    = window.__DASHBOARD__;
  var items = _d.items;
  var meta  = _d.meta;

  /* ------------------------------------------------------------------
     Canonical status resolution
  ------------------------------------------------------------------ */
  var statusMap = meta.statusMap || {};

  function canonical(raw) {
    if (!raw) return null;
    return statusMap[raw] || raw;
  }

  /* ------------------------------------------------------------------
     Five-state colour map
  ------------------------------------------------------------------ */
  var CANONICAL_BG = {
    'Finished':         '#1B5E20',   // dark green  → white text (tile-dark)
    'SUP Accepted':     '#66BB6A',   // mid green   → black text
    'SUP Initiated':    '#FF9800',   // orange      → black text
    'Owner Identified': '#FFD600',   // yellow      → black text
    'No Owner':         '#E0E0E0',   // light grey  → black text
  };

  var CANONICAL_DARK  = { 'Finished': true };
  var DONE_CANONICAL  = { 'Finished': true };
  var CANONICAL_ORDER = {
    'Finished': 0, 'SUP Accepted': 1, 'SUP Initiated': 2,
    'Owner Identified': 3, 'No Owner': 4,
  };

  function statusRank(raw) {
    var c = canonical(raw);
    return CANONICAL_ORDER[c] != null ? CANONICAL_ORDER[c] : 99;
  }

  /* ------------------------------------------------------------------
     Theme config
  ------------------------------------------------------------------ */
  // Build KNOWN_THEMES dynamically from TWG item labels so new themes appear
  // automatically without code changes. Falls back to config order / defaults.
  var configThemes = meta.themes || ['Trust', 'Flexibility', 'Robustness'];
  var _seenThemes  = [];
  items.forEach(function (i) {
    if (i.source === 'twg' && i.theme && _seenThemes.indexOf(i.theme) === -1) {
      _seenThemes.push(i.theme);
    }
  });
  // Preserve config ordering for known themes, then append any newly seen ones
  var KNOWN_THEMES = _seenThemes.length > 0
    ? configThemes.filter(function (t) { return _seenThemes.indexOf(t) !== -1; })
        .concat(_seenThemes.filter(function (t) { return configThemes.indexOf(t) === -1; }))
    : configThemes;
  var THEME_KEYS = KNOWN_THEMES.concat(['Unassigned']);

  var THEME_CSS = {
    'Trust':       'trust',
    'Flexibility': 'flexibility',
    'Robustness':  'robustness',
    'Unassigned':  'unassigned',
  };

  /* ------------------------------------------------------------------
     Tab definitions
  ------------------------------------------------------------------ */
  var TABS = [
    { key: 'twg', label: 'TWG Features',
      // type comes from the org-level issue type on each GitHub Issue.
      filter: function (i) { return i.source === 'twg' && i.type === 'Feature (TWG)'; } },
    { key: 'pm',  label: 'PM Epics',
      // type comes from the org-level issue type on each GitHub Issue.
      filter: function (i) { return i.source === 'pm'  && i.type === 'Epic (Child)';  } },
  ];
  var DEFAULT_TAB = 0; // TWG Features

  /* Sub-tab state — shared across both main tabs */
  var currentSubTab = 'pr2'; // 'pr1' | 'pr2' | 'ga1' (ga1 = all releases combined)

  /* ------------------------------------------------------------------
     Header badges
  ------------------------------------------------------------------ */
  setText('badge-release', 'Current release: ' + (meta.currentRelease  || '\u2014'));
  setText('badge-next',    'Next release: '     + (meta.nextReleaseDate || '\u2014'));
  setText('badge-updated', 'Updated: '          + meta.generatedAt);

  /* ------------------------------------------------------------------
     Release timeline (global) — with tooltips and clickable milestones
  ------------------------------------------------------------------ */
  (function renderTimeline() {
    var el = document.getElementById('timeline');
    if (!el || !(meta.releases || []).length) return;

    var releases          = meta.releases;
    var currentIdx        = releases.indexOf(meta.currentRelease);
    var releaseDates      = meta.releaseDates      || {};
    var milestoneLinks    = meta.milestoneLinks    || {};
    var milestoneTooltips = meta.milestoneTooltips || {};

    // Build title row with optional info icon
    var titleEl = make('div', 'timeline-title');
    titleEl.appendChild(document.createTextNode('Release Journey'));

    if (meta.releaseJourneyInfo && meta.releaseJourneyInfo.sections) {
      var infoBtn = make('span', 'rj-info-btn');
      infoBtn.textContent = 'i';
      titleEl.appendChild(infoBtn);

      var callout = make('div', 'rj-info-callout');
      meta.releaseJourneyInfo.sections.forEach(function (sec) {
        var section = make('div', 'rj-section');
        var heading = make('div', 'rj-section-heading');
        heading.textContent = sec.heading;
        section.appendChild(heading);
        if (sec.intro) {
          var intro = make('div', 'rj-section-intro');
          intro.textContent = sec.intro;
          section.appendChild(intro);
        }
        if (sec.bullets && sec.bullets.length) {
          var ul = document.createElement('ul');
          ul.className = 'rj-section-list';
          sec.bullets.forEach(function (b) {
            var li = document.createElement('li');
            li.textContent = b;
            ul.appendChild(li);
          });
          section.appendChild(ul);
        }
        callout.appendChild(section);
      });
      titleEl.appendChild(callout);

      infoBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        titleEl.classList.toggle('rj-open');
      });
      callout.addEventListener('click', function (e) { e.stopPropagation(); });
      document.addEventListener('click', function () { titleEl.classList.remove('rj-open'); });
    }

    el.appendChild(titleEl);
    var trackEl = make('div', '');
    trackEl.id = 'tl-track';
    trackEl.className = 'timeline-track';
    el.appendChild(trackEl);

    var track = document.getElementById('tl-track');

    releases.forEach(function (rel, idx) {
      var state  = idx < currentIdx  ? 'ms-done'
                 : idx === currentIdx ? 'ms-active'
                 : 'ms-upcoming';
      var circle = state === 'ms-done' ? '&#10003;' : esc(rel);

      // Sub-label under the circle
      var sub = '';
      if (state === 'ms-done' && releaseDates[rel]) {
        sub = releaseDates[rel];
      } else if (state === 'ms-active' && meta.nextReleaseDate) {
        sub = meta.nextReleaseDate;
      } else if (state === 'ms-upcoming' && releaseDates[rel]) {
        sub = (rel === 'GA1' ? 'est ' : '') + releaseDates[rel];
      }

      // Tooltip text — replace {nextReleaseDate} placeholder
      var rawTip = milestoneTooltips[rel] || '';
      var tipText = rawTip.replace('{nextReleaseDate}', meta.nextReleaseDate || '\u2014');

      var hasLink = !!milestoneLinks[rel];
      var ms = make('div', 'milestone ' + state + (hasLink ? ' has-link' : ''));

      ms.innerHTML =
        '<div class="ms-circle">' + circle + '</div>' +
        '<div class="ms-label">'  + esc(state === 'ms-active' ? rel + ' (Next Release)'
                                       : rel === 'GA1'         ? rel + ' (V1.0 Release)'
                                       : rel) + '</div>' +
        (sub     ? '<div class="ms-sub">'     + esc(sub)     + '</div>' : '') +
        (tipText ? '<div class="ms-tooltip">' + esc(tipText) + '</div>' : '');

      if (hasLink) {
        ms.addEventListener('click', function () {
          window.open(milestoneLinks[rel], '_blank', 'noopener,noreferrer');
        });
      }

      // Purpose & Scope click-callout
      var scopeText = (meta.milestoneScopeText || {})[rel];
      if (scopeText) {
        var scopeBtn = document.createElement('div');
        scopeBtn.className = 'ms-scope-btn';
        scopeBtn.textContent = 'Purpose & Scope ▸';
        ms.appendChild(scopeBtn);

        var callout = document.createElement('div');
        callout.className = 'ms-scope-callout';
        var calloutTitle = document.createElement('div');
        calloutTitle.className = 'ms-scope-title';
        calloutTitle.textContent = 'Purpose & Scope';
        var calloutBody = document.createElement('p');
        calloutBody.style.margin = '0';
        calloutBody.textContent = scopeText;
        callout.appendChild(calloutTitle);
        callout.appendChild(calloutBody);
        ms.appendChild(callout);

        scopeBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = ms.classList.contains('scope-open');
          document.querySelectorAll('.milestone.scope-open').forEach(function (m) {
            m.classList.remove('scope-open');
          });
          if (!isOpen) ms.classList.add('scope-open');
        });

        callout.addEventListener('click', function (e) {
          e.stopPropagation(); // keep callout open when clicking inside it
        });
      }

      track.appendChild(ms);
    });

    // Close any open scope callout when clicking elsewhere on the page
    document.addEventListener('click', function () {
      document.querySelectorAll('.milestone.scope-open').forEach(function (m) {
        m.classList.remove('scope-open');
      });
    });
  }());

  /* ------------------------------------------------------------------
     Wire up tab buttons
  ------------------------------------------------------------------ */
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      switchTab(parseInt(btn.dataset.tab, 10));
    });
  });

  function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach(function (b) {
      b.classList.toggle('active', parseInt(b.dataset.tab, 10) === idx);
    });
    document.querySelectorAll('.tab-panel').forEach(function (p) {
      var becoming = parseInt(p.dataset.tab, 10) === idx;
      p.classList.toggle('active', becoming);
    });
    // Re-render the newly active panel respecting the current sub-tab filter
    if (TABS[idx]) renderThemes(TABS[idx]);
  }

  /* ------------------------------------------------------------------
     Populate each tab panel
  ------------------------------------------------------------------ */
  TABS.forEach(function (tab, idx) {
    // Render summary + theme section through the shared renderThemes path so
    // the sub-tab filter is always applied consistently (default: 'pr2').
    renderThemes(tab);

    // Animate progress bar for the default (visible) tab immediately.
    // renderThemes sets width:0 then rAF to target; kick the animation here
    // so it runs on the already-visible panel without waiting for a tab click.
    if (idx === DEFAULT_TAB) {
      requestAnimationFrame(function () { animateFill(tab.key, getTabItems(tab)); });
    }
  });

  function animateFill(key, tabItems) {
    var done = tabItems.filter(function (i) {
      return DONE_CANONICAL[canonical(i.status)];
    }).length;
    var pct = tabItems.length > 0
      ? Math.round((done / tabItems.length) * 100) : 0;
    var el = document.getElementById('fill-' + key);
    if (el) el.style.width = pct + '%';
  }

  /* ------------------------------------------------------------------
     Sub-tab filtering
  ------------------------------------------------------------------ */

  /**
   * Returns items for a tab after applying both the tab's source/type filter
   * and the current sub-tab release filter.
   */
  function getTabItems(tab) {
    var filtered = items.filter(tab.filter);
    if (currentSubTab === 'pr1') return filtered.filter(function (i) { return i.release === 'PR1'; });
    if (currentSubTab === 'pr2') return filtered.filter(function (i) { return i.release === 'PR2'; });
    return filtered; // 'ga1' — no release filter, shows all
  }

  /**
   * Rebuilds the summary bar and theme section for a tab using the current
   * sub-tab filter.  Replaces the theme-section DOM node entirely so the
   * fadeIn animation re-triggers on each sub-tab switch.
   */
  function renderThemes(tab) {
    var tabItems = getTabItems(tab);

    // Update summary counts
    var done = tabItems.filter(function (i) { return DONE_CANONICAL[canonical(i.status)]; }).length;
    var pct  = tabItems.length > 0 ? Math.round((done / tabItems.length) * 100) : 0;
    var label = currentSubTab === 'pr1' ? 'PR1 items'
              : currentSubTab === 'pr2' ? 'PR2 items'
              : 'items';
    setText('sum-text-' + tab.key, done + ' of ' + tabItems.length + ' ' + label + ' complete');
    setText('sum-pct-'  + tab.key, pct + '%');

    // Reset then animate fill bar
    var fill = document.getElementById('fill-' + tab.key);
    if (fill) { fill.style.width = '0%'; }
    requestAnimationFrame(function () { animateFill(tab.key, tabItems); });

    // Update release banner
    var banner = document.getElementById('release-banner-' + tab.key);
    if (banner) {
      banner.innerHTML = '';
      if (currentSubTab === 'pr1') {
        var b = make('div', 'release-banner pr1-banner');
        var icon = make('span', 'banner-icon'); icon.textContent = '\u2705';
        var txt = make('span', ''); txt.textContent = 'PR1 \u2014 ' + (meta.releaseDates['PR1'] || 'Released') + ' \u00b7 Showing completed items only';
        b.appendChild(icon); b.appendChild(txt);
        banner.appendChild(b);
      } else if (currentSubTab === 'pr2') {
        var b = make('div', 'release-banner pr2-banner');
        var dot = make('span', 'banner-pulse-dot');
        var txt = make('span', ''); txt.textContent = 'PR2 \u2014 In Progress \u00b7 Target ' + (meta.nextReleaseDate || '') + ' \u00b7 Showing in-progress items';
        b.appendChild(dot); b.appendChild(txt);
        banner.appendChild(b);
      }
    }

    // Replace the theme-section node (re-triggers fadeIn CSS animation)
    var old = document.getElementById('themes-' + tab.key);
    if (!old) return;
    var fresh = make('div', 'theme-section');
    fresh.id  = 'themes-' + tab.key;
    old.parentNode.replaceChild(fresh, old);
    // PM Epics: flat tile grid (no theme grouping). TWG: grouped by theme.
    if (tab.key === 'pm') {
      renderFlatGrid(tabItems, fresh);
    } else {
      renderThemeSection(tabItems, fresh);
    }
  }

  /**
   * Switches the active sub-tab, updates button states across all sub-tab
   * bars, and re-renders the currently visible main-tab panel.
   * Exposed on window so HTML onclick attributes can call it directly.
   */
  function switchSubTab(value) {
    currentSubTab = value;
    // Sync active class on every .sub-tab button (both panels have their own bar)
    document.querySelectorAll('.sub-tab').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.subTab === value);
    });
    // Re-render the currently active main-tab panel
    var activePanel = document.querySelector('.tab-panel.active');
    if (activePanel) {
      var idx = parseInt(activePanel.dataset.tab, 10);
      if (TABS[idx]) renderThemes(TABS[idx]);
    }
  }
  window.switchSubTab = switchSubTab; // expose for HTML onclick

  /* ------------------------------------------------------------------
     Theme section renderer
  ------------------------------------------------------------------ */
  function renderThemeSection(tabItems, container) {
    THEME_KEYS.forEach(function (theme) {
      // Filter items for this theme bucket
      var themeItems = tabItems.filter(function (i) {
        if (theme === 'Unassigned') {
          return !i.theme || KNOWN_THEMES.indexOf(i.theme) === -1;
        }
        return i.theme === theme;
      });

      if (themeItems.length === 0) return; // skip empty rows

      // Sort within row: most-progressed status first
      themeItems = themeItems.slice().sort(function (a, b) {
        return statusRank(a.status) - statusRank(b.status);
      });

      var hasPr2 = themeItems.some(function (i) {
        return i.status === 'PR2 Core Scope Features';
      });

      var cssKey = THEME_CSS[theme] || 'unassigned';
      var row    = make('div', 'theme-row' + (hasPr2 ? ' pr2-focus' : ''));

      // Label column
      var labelCol = make('div', 'theme-label-col theme-col-' + cssKey);
      labelCol.innerHTML =
        '<span class="label-text">' + esc(theme) + '</span>' +
        '<span class="label-count">' + themeItems.length +
          (themeItems.length === 1 ? ' item' : ' items') + '</span>';

      // Description tooltip — populated from config.themeDescriptions
      var themeDesc = (meta.themeDescriptions || {})[theme];
      if (themeDesc) {
        var infoIcon = make('span', 'theme-info-icon');
        infoIcon.textContent = 'i';
        labelCol.appendChild(infoIcon);

        var tip = make('div', 'theme-tooltip');
        var tipTitle = make('div', 'theme-tooltip-title');
        tipTitle.textContent = themeDesc.title || theme;
        tip.appendChild(tipTitle);
        if (themeDesc.bullets && themeDesc.bullets.length) {
          var tipList = document.createElement('ul');
          tipList.className = 'theme-tooltip-list';
          themeDesc.bullets.forEach(function (b) {
            var li = document.createElement('li');
            li.textContent = b;
            tipList.appendChild(li);
          });
          tip.appendChild(tipList);
        }
        labelCol.appendChild(tip);
      }

      row.appendChild(labelCol);

      // Tiles grid
      var grid = make('div', 'theme-tiles');
      themeItems.forEach(function (item) {
        grid.appendChild(buildTile(item));
      });
      row.appendChild(grid);

      container.appendChild(row);
    });
  }

  /**
   * Flat tile grid — used for PM Epics where theme grouping doesn't apply.
   * Items are sorted by status rank and rendered directly without theme rows.
   */
  function renderFlatGrid(tabItems, container) {
    var sorted = tabItems.slice().sort(function (a, b) {
      return statusRank(a.status) - statusRank(b.status);
    });
    if (sorted.length === 0) return;
    var grid = make('div', 'theme-tiles flat-grid');
    sorted.forEach(function (item) {
      grid.appendChild(buildTile(item));
    });
    container.appendChild(grid);
  }

  /* ------------------------------------------------------------------
     Tile builder
  ------------------------------------------------------------------ */
  function buildTile(item) {
    var c   = canonical(item.status);
    var cls = 'tile';
    if (CANONICAL_DARK[c])         cls += ' tile-dark';
    if (item.supRequired === 'No') cls += ' sup-no';

    var tile = make('div', cls);
    tile.style.background = CANONICAL_BG[c] || '#e8eef7';

    // Release pill — top-right corner, shows on every sub-tab view
    var PILL_CLS = { PR1: 'pr1', PR2: 'pr2', PR3: 'pr3', GA1: 'pr3' };
    if (item.release && PILL_CLS[item.release]) {
      var pill = make('span', 'release-pill ' + PILL_CLS[item.release]);
      pill.textContent = item.release;
      tile.appendChild(pill);
    }

    var pr2Badge = (item.status === 'PR2 Core Scope Features')
      ? '<span class="priority-badge">PR2</span>' : '';

    var head = make('div', 'tile-head' + (item.release ? ' has-pill' : ''));
    head.innerHTML =
      '<div class="tile-dot"></div>' +
      '<div class="tile-name">' + esc(item.title || '(untitled)') + pr2Badge + '</div>' +
      '<div class="tile-arrow">&#9658;</div>';
    tile.appendChild(head);

    var body = make('div', 'tile-body');
    body.innerHTML =
      drow('Status',       c)                    +
      drow('Theme',        item.theme)            +
      drow('Type',         item.type)             +
      drow('SUP required', item.supRequired)      +
      drow('Target date',  item.targetDate)       +
      drow('Release',      item.release)          +
      drow('Source',       srcLabel(item.source)) +
      (item.url
        ? '<a class="gh-link" href="' + esc(item.url) +
          '" target="_blank" rel="noopener">View on GitHub &#8599;</a>'
        : '');

    // Sub-issues collapsible section (DOM-built, not innerHTML)
    if (item.subIssues && item.subIssues.length > 0) {
      var siSection = make('div', 'sub-issues-section');

      var siToggle = make('button', 'sub-issues-toggle');
      var chevron  = make('span',   'sub-issues-chevron');
      chevron.textContent = '\u25b6'; // ▶
      siToggle.appendChild(chevron);
      var siLabel = item.source === 'twg' ? 'Linked Issues' : 'Features';
      siToggle.appendChild(document.createTextNode(
        '\u00a0' + siLabel + ' (' + item.subIssueCount + ')'
      ));
      siSection.appendChild(siToggle);

      var siList = make('div', 'sub-issues-list');
      item.subIssues.forEach(function (si) {
        var row  = make('div', 'sub-issue-row');
        var dot  = make('span', 'sub-issue-dot ' + (si.state === 'CLOSED' ? 'closed' : 'open'));
        var ttl  = make('span', 'sub-issue-title');
        ttl.textContent = si.title || ('#' + si.number);
        var num  = make('span', 'sub-issue-num');
        num.textContent = '#' + si.number;
        row.appendChild(dot);
        row.appendChild(ttl);
        row.appendChild(num);
        if (si.url) {
          var lnk = make('a', 'sub-issue-link');
          lnk.href = si.url;
          lnk.target = '_blank';
          lnk.rel    = 'noopener';
          lnk.textContent = '\u2192'; // →
          lnk.title = 'Open in GitHub';
          row.appendChild(lnk);
        }
        siList.appendChild(row);
      });
      siSection.appendChild(siList);

      siToggle.addEventListener('click', function (e) {
        e.stopPropagation(); // don't collapse the parent tile
        siSection.classList.toggle('sub-issues-open');
      });

      body.appendChild(siSection);
    }

    tile.appendChild(body);

    head.addEventListener('click', function () { tile.classList.toggle('open'); });
    return tile;
  }

  /* ------------------------------------------------------------------
     Legend
  ------------------------------------------------------------------ */
  var legendEl = document.getElementById('legend-items');
  if (legendEl) {
    Object.keys(CANONICAL_BG).forEach(function (state) {
      var li = make('div', 'legend-item');
      var sw = make('div', 'swatch');
      sw.style.background = CANONICAL_BG[state];
      li.appendChild(sw);
      li.appendChild(document.createTextNode(state));
      legendEl.appendChild(li);
    });
  }

  var legendExtra = document.getElementById('legend-extra');
  if (legendExtra) {
    // SUP Required = No border
    var supLi = make('div', 'legend-item');
    var supSw = make('div', 'swatch');
    supSw.style.background    = '#e8eef7';
    supSw.style.outline       = '3px solid #111827';
    supSw.style.outlineOffset = '-1px';
    supLi.appendChild(supSw);
    supLi.appendChild(document.createTextNode('SUP Required = No'));
    legendExtra.appendChild(supLi);

    // PR2 focus row border
    var focusLi = make('div', 'legend-item');
    var focusSw = make('div', 'swatch');
    focusSw.style.background = 'transparent';
    focusSw.style.border     = '2px solid #d32f2f';
    focusLi.appendChild(focusSw);
    focusLi.appendChild(document.createTextNode('PR2 focus theme row'));
    legendExtra.appendChild(focusLi);

    // PR1 badge
    var pr1Li   = make('div', 'legend-item');
    var pr1Bdg  = make('span', 'pr1-badge');
    pr1Bdg.textContent = 'PR1';
    pr1Li.appendChild(pr1Bdg);
    pr1Li.appendChild(document.createTextNode('\u00a0Released scope item'));
    legendExtra.appendChild(pr1Li);

    // PR2 badge
    var badgeLi = make('div', 'legend-item');
    var badge   = make('span', 'priority-badge');
    badge.textContent = 'PR2';
    badgeLi.appendChild(badge);
    badgeLi.appendChild(document.createTextNode('\u00a0Core Scope item'));
    legendExtra.appendChild(badgeLi);
  }

  /* ------------------------------------------------------------------
     Utilities
  ------------------------------------------------------------------ */
  function setText(id, txt) {
    var el = document.getElementById(id);
    if (el) el.textContent = txt;
  }

  function make(tag, cls) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    return el;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function drow(label, value) {
    if (value == null || value === '') return '';
    return '<div class="detail-row">' +
      '<span class="detail-label">' + esc(label)         + '</span>' +
      '<span class="detail-value">' + esc(String(value)) + '</span>' +
      '</div>';
  }

  function srcLabel(src) {
    var p = (meta.projects || {})[src];
    return p ? p.label : (src || null);
  }

}());
</script>

</body>
</html>
